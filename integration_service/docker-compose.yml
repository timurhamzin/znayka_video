services:
  redis:
    image: redis:7-alpine
    container_name: znayka-redis
    ports:
      - '6379:6379'

  app:
    build:
      context: ..
      dockerfile: integration_service/Dockerfile
    container_name: znayka-integration-app
    working_dir: /workspace
    command: uv run --project integration_service uvicorn app.main:app --host 0.0.0.0 --port 8010 --reload
    env_file:
      - .env.example
    environment:
      INTEGRATION_REDIS_HOST: redis
      INTEGRATION_REDIS_PORT: 6379
      INTEGRATION_REDIS_DB: 0
      INTEGRATION_APP_HOST: 0.0.0.0
      INTEGRATION_APP_PORT: 8010
    ports:
      - '8010:8010'
    volumes:
      - ..:/workspace
    depends_on:
      - redis

  worker:
    build:
      context: ..
      dockerfile: integration_service/Dockerfile
    container_name: znayka-integration-worker
    working_dir: /workspace
    command: uv run --project integration_service arq app.worker.WorkerSettings
    env_file:
      - .env.example
    environment:
      INTEGRATION_REDIS_HOST: redis
      INTEGRATION_REDIS_PORT: 6379
      INTEGRATION_REDIS_DB: 0
    volumes:
      - ..:/workspace
    depends_on:
      - redis
